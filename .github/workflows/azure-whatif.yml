name: Azure What-If

on:
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: "Target resource group"
        required: true
        default: "rg-az305-reference-dev"
      location:
        description: "Azure region"
        required: true
        default: "westeurope"
      parameterFile:
        description: "Bicep parameter file"
        required: true
        default: "params/minimal.dev.bicepparam"

permissions:
  id-token: write
  contents: read

jobs:
  whatif:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "${{ github.event.inputs.resourceGroupName }}" \
            --location "${{ github.event.inputs.location }}" \
            --tags environment=dev certification=AZ-305 managedBy=github-actions

      - name: Deployment what-if
        run: |
          az deployment group what-if \
            --resource-group "${{ github.event.inputs.resourceGroupName }}" \
            --parameters "${{ github.event.inputs.parameterFile }}"
