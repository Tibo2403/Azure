name: Azure What-If

on:
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: "Target resource group"
        required: true
        default: "rg-az305-reference-dev"
      location:
        description: "Azure region"
        required: true
        default: "westeurope"
      parameterFile:
        description: "Bicep parameter file"
        required: true
        default: "params/minimal.dev.bicepparam"
      createResourceGroup:
        description: "Create the resource group before running what-if"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-whatif-${{ github.event.inputs.resourceGroupName }}
  cancel-in-progress: true

jobs:
  whatif:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        if: ${{ github.event.inputs.createResourceGroup == 'true' }}
        run: |
          az group create \
            --name "${{ github.event.inputs.resourceGroupName }}" \
            --location "${{ github.event.inputs.location }}" \
            --tags environment=dev certification=AZ-305 managedBy=github-actions

      - name: Deployment what-if
        run: |
          az deployment group what-if \
            --resource-group "${{ github.event.inputs.resourceGroupName }}" \
            --parameters "${{ github.event.inputs.parameterFile }}"
