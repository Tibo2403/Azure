name: Azure Lab Cleanup

on:
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: "AZ-305 lab resource group to delete"
        required: true
      noWait:
        description: "Delete asynchronously"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-lab-cleanup-${{ github.event.inputs.resourceGroupName }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: azure-lab-cleanup

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete lab resource group
        shell: pwsh
        run: |
          $noWait = "${{ github.event.inputs.noWait }}" -eq "true"
          ./scripts/destroy-lab.ps1 `
            -ResourceGroupName "${{ github.event.inputs.resourceGroupName }}" `
            -NoWait:$noWait
