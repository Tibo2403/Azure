name: Bicep Validation

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: bicep-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Bicep is available
        run: |
          az bicep install

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Validate Bicep, parameter files, and scripts
        shell: pwsh
        run: |
          ./scripts/validate-az305.ps1

      - name: Run repository tests
        shell: pwsh
        run: |
          ./scripts/run-tests.ps1
